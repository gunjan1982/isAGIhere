openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI Industry Hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: people
    description: AI industry people
  - name: sources
    description: Newsletters, blogs, podcasts
  - name: communities
    description: Reddit, Discord, X communities
  - name: categories
    description: Category listings
  - name: feed
    description: Live news and content feed
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /people:
    get:
      operationId: listPeople
      tags: [people]
      summary: List all AI industry people
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of people
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Person"

  /people/{id}:
    get:
      operationId: getPerson
      tags: [people]
      summary: Get a person by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Person details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "404":
          description: Not found

  /people/{id}/feed:
    get:
      operationId: getPersonFeed
      tags: [feed]
      summary: Get the live feed for a specific person
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Person's feed items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedItem"

  /sources:
    get:
      operationId: listSources
      tags: [sources]
      summary: List all sources
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [newsletter, blog, podcast, youtube, news_site]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Source"

  /communities:
    get:
      operationId: listCommunities
      tags: [communities]
      summary: List all communities
      parameters:
        - name: platform
          in: query
          schema:
            type: string
            enum: [reddit, discord, x]
      responses:
        "200":
          description: List of communities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Community"

  /stats:
    get:
      operationId: getStats
      tags: [categories]
      summary: Get aggregate stats for the hub
      responses:
        "200":
          description: Hub stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HubStats"

  /featured:
    get:
      operationId: getFeatured
      tags: [categories]
      summary: Get featured/spotlight content
      responses:
        "200":
          description: Featured content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeaturedContent"

  /feed:
    get:
      operationId: getFeed
      tags: [feed]
      summary: Get the global live feed
      parameters:
        - name: personId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Feed items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedPage"

  /feed/refresh:
    post:
      operationId: refreshFeed
      tags: [feed]
      summary: Trigger a feed refresh
      responses:
        "200":
          description: Refresh triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Person:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
        organization:
          type: string
        category:
          type: string
        bio:
          type: string
        stance:
          type: string
        twitterHandle:
          type: string
        twitterFollowers:
          type: string
        primaryPlatform:
          type: string
        bestFor:
          type: string
        imageUrl:
          type: string
        isSpotlight:
          type: boolean
      required:
        - id
        - name
        - role
        - category

    Source:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        description:
          type: string
        audience:
          type: string
        frequency:
          type: string
        url:
          type: string
        subscriberCount:
          type: string
        host:
          type: string
        bestFor:
          type: string
        isHighSignal:
          type: boolean
      required:
        - id
        - name
        - type

    Community:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        platform:
          type: string
        memberCount:
          type: string
        description:
          type: string
        url:
          type: string
        bestFor:
          type: string
      required:
        - id
        - name
        - platform

    FeedItem:
      type: object
      properties:
        id:
          type: integer
        personId:
          type: integer
        personName:
          type: string
        personCategory:
          type: string
        title:
          type: string
        url:
          type: string
        description:
          type: string
        sourceName:
          type: string
        sourceUrl:
          type: string
        imageUrl:
          type: string
        publishedAt:
          type: string
        type:
          type: string
      required:
        - id
        - title
        - url

    FeedPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FeedItem"
        total:
          type: integer
        hasMore:
          type: boolean
      required:
        - items
        - total
        - hasMore

    RefreshResult:
      type: object
      properties:
        fetched:
          type: integer
        message:
          type: string
      required:
        - fetched
        - message

    HubStats:
      type: object
      properties:
        totalPeople:
          type: integer
        totalSources:
          type: integer
        totalCommunities:
          type: integer
        totalFeedItems:
          type: integer
        categoryCounts:
          type: object
          additionalProperties:
            type: integer
        sourceTypeCounts:
          type: object
          additionalProperties:
            type: integer
      required:
        - totalPeople
        - totalSources
        - totalCommunities
        - totalFeedItems
        - categoryCounts
        - sourceTypeCounts

    FeaturedContent:
      type: object
      properties:
        spotlightPerson:
          $ref: "#/components/schemas/Person"
        topNewsletters:
          type: array
          items:
            $ref: "#/components/schemas/Source"
        topPodcasts:
          type: array
          items:
            $ref: "#/components/schemas/Source"
        vibeCodingVoices:
          type: array
          items:
            $ref: "#/components/schemas/Person"
        recentFeed:
          type: array
          items:
            $ref: "#/components/schemas/FeedItem"
      required:
        - topNewsletters
        - topPodcasts
        - vibeCodingVoices
        - recentFeed
